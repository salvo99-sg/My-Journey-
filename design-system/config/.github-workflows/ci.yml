name: My Journey CI

on:

  push:

    branches:

      - main
      - develop

  pull_request:

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Validate HTML

        run: echo "HTML validation"

      - name: Validate CSS

        run: echo "CSS validation"

      - name: Validate JavaScript

        run: echo "JavaScript validation"

      - name: Validate Manifest

        run: echo "Manifest validation"

      - name: Validate PWA

        run: echo "PWA validation"

      - name: Project Structure

        run: echo "Structure OK"

      - name: Finish

        run: echo "Build Passed"
