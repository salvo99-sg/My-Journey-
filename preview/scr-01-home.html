<style>
html,body{margin:0;padding:0}
body{width:393px;min-height:852px;background:var(--color-bg);font-family:var(--font-ui);color:var(--color-text);overflow:hidden}
*{-webkit-font-smoothing:antialiased}
.scr{display:flex;flex-direction:column;min-height:852px}
.pad{padding:0 18px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
.topbar .ed{font-family:var(--font-editorial);font-size:26px;line-height:1}
.ico{display:inline-flex;width:40px;height:40px;border-radius:50%;background:var(--color-surface);align-items:center;justify-content:center;box-shadow:var(--shadow-xs);font-size:17px}
.sect{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--color-text-muted);font-weight:800;margin:20px 0 10px}
.cover{background:linear-gradient(135deg,var(--trip-gradient-start),var(--trip-gradient-end))}
.grad-navy{background:linear-gradient(160deg,#16264C,#22345f)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--color-surface-secondary);font-size:12px;font-weight:700;color:var(--color-text-secondary)}
.bnav{margin-top:auto;position:sticky;bottom:0;display:flex;justify-content:space-around;align-items:center;padding:10px 12px calc(env(safe-area-inset-bottom) + 12px);background:var(--glass-nav);backdrop-filter:blur(20px);border-top:1px solid var(--color-border)}
.bnav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--color-text-muted);text-decoration:none}
.bnav a.on{color:var(--trip-accent,#D97706)}
.bnav .plus{width:52px;height:52px;border-radius:18px;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-md)}
.bar{height:8px;border-radius:999px;background:var(--color-border);overflow:hidden}
.bar>i{display:block;height:100%;background:var(--trip-accent);border-radius:inherit}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-sm)}
.mark{position:relative;display:inline-flex;width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.25)}
.mark span{transform:rotate(45deg);color:#fff;font-size:13px;font-weight:800}
</style>
</head><body><div class="scr">
<div class="topbar"><div class="ed">I miei viaggi</div><div class="ico">🔔</div></div>
<div class="pad">
  <article class="trip-card trip-card--active" data-trip-theme="japan">
    <div class="cover" style="height:140px;border-radius:20px 20px 0 0;position:relative">
      <span style="position:absolute;top:12px;left:12px;background:#fff;color:var(--trip-accent);padding:6px 12px;border-radius:999px;font-size:12px;font-weight:800">In corso</span>
      <span style="position:absolute;bottom:12px;left:14px;color:#fff;font-family:var(--font-editorial);font-size:26px;text-shadow:0 1px 6px rgba(0,0,0,.4)">Giappone</span>
    </div>
    <div style="padding:16px">
      <div style="color:var(--color-text-secondary);font-size:13px">12 – 21 Aprile 2025 · Tokyo, Kyoto, Osaka</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;color:var(--color-text-secondary);margin:14px 0 6px"><span>Avanzamento</span><span>68%</span></div>
      <div class="bar" data-trip-theme="japan"><i style="width:68%"></i></div>
    </div>
  </article>
  <div class="sect">Continua a pianificare</div>
  <div class="card" data-trip-theme="greece" style="display:flex;gap:12px;padding:12px;align-items:center;margin-bottom:10px">
    <div class="cover" style="width:52px;height:52px;border-radius:14px;flex:none"></div>
    <div style="flex:1"><div style="font-weight:700">Grecia</div><div style="font-size:12px;color:var(--color-text-secondary)">20 – 28 Maggio</div></div>
    <span class="chip" style="background:var(--color-warning-soft);color:var(--color-warning)">In programma</span>
  </div>
  <div class="card" data-trip-theme="iceland" style="display:flex;gap:12px;padding:12px;align-items:center">
    <div class="cover" style="width:52px;height:52px;border-radius:14px;flex:none"></div>
    <div style="flex:1"><div style="font-weight:700">Islanda</div><div style="font-size:12px;color:var(--color-text-secondary)">Bozza · manca: date, voli</div></div>
    <span class="chip" style="background:var(--color-error-soft);color:var(--color-error)">Bozza</span>
  </div>
  <div class="sect">Ricordi recenti</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
    <div class="cover" data-trip-theme="japan" style="height:84px;border-radius:14px"></div>
    <div class="cover" data-trip-theme="italy" style="height:84px;border-radius:14px"></div>
    <div class="cover" data-trip-theme="tropical" style="height:84px;border-radius:14px"></div>
  </div>
</div>
<nav class="bnav">
<a class="on">⌂<span>Home</span></a>
<a class="">🗺<span>Mappa</span></a>
<a><div class="plus">+</div></a>
<a class="">✎<span>Diario</span></a>
<a class="">◉<span>Profilo</span></a>
</nav>
</div></body></html>
