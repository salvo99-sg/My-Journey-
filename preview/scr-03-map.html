<style>
html,body{margin:0;padding:0}
body{width:393px;min-height:852px;background:var(--color-bg);font-family:var(--font-ui);color:var(--color-text);overflow:hidden}
*{-webkit-font-smoothing:antialiased}
.scr{display:flex;flex-direction:column;min-height:852px}
.pad{padding:0 18px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 8px}
.topbar .ed{font-family:var(--font-editorial);font-size:26px;line-height:1}
.ico{display:inline-flex;width:40px;height:40px;border-radius:50%;background:var(--color-surface);align-items:center;justify-content:center;box-shadow:var(--shadow-xs);font-size:17px}
.sect{font-size:11px;letter-spacing:.10em;text-transform:uppercase;color:var(--color-text-muted);font-weight:800;margin:20px 0 10px}
.cover{background:linear-gradient(135deg,var(--trip-gradient-start),var(--trip-gradient-end))}
.grad-navy{background:linear-gradient(160deg,#16264C,#22345f)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--color-surface-secondary);font-size:12px;font-weight:700;color:var(--color-text-secondary)}
.bnav{margin-top:auto;position:sticky;bottom:0;display:flex;justify-content:space-around;align-items:center;padding:10px 12px calc(env(safe-area-inset-bottom) + 12px);background:var(--glass-nav);backdrop-filter:blur(20px);border-top:1px solid var(--color-border)}
.bnav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;color:var(--color-text-muted);text-decoration:none}
.bnav a.on{color:var(--trip-accent,#D97706)}
.bnav .plus{width:52px;height:52px;border-radius:18px;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:var(--shadow-md)}
.bar{height:8px;border-radius:999px;background:var(--color-border);overflow:hidden}
.bar>i{display:block;height:100%;background:var(--trip-accent);border-radius:inherit}
.card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-2xl);box-shadow:var(--shadow-sm)}
.mark{position:relative;display:inline-flex;width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);align-items:center;justify-content:center;box-shadow:0 6px 14px rgba(0,0,0,.25)}
.mark span{transform:rotate(45deg);color:#fff;font-size:13px;font-weight:800}
</style>
</head><body data-trip-theme="japan"><div class="scr">
<div class="grad-navy" style="flex:1;position:relative;min-height:560px">
  <div style="position:absolute;left:16px;top:18px;color:#fff;font-family:var(--font-editorial);font-size:20px">Mappa</div>
  <div class="mark" style="position:absolute;left:30%;top:32%;background:var(--marker-hotel)"><span>H</span></div>
  <div class="mark" style="position:absolute;left:55%;top:44%;background:var(--marker-restaurant)"><span>R</span></div>
  <div class="mark" style="position:absolute;left:44%;top:56%;background:var(--marker-attraction)"><span>★</span></div>
  <div class="mark" style="position:absolute;left:66%;top:62%;background:var(--color-success)"><span>●</span></div>
  <svg style="position:absolute;inset:0" width="393" height="560"><path d="M120 190 Q 220 260 175 320 T 262 350" fill="none" stroke="var(--trip-accent)" stroke-width="4" stroke-dasharray="2 8" stroke-linecap="round"/></svg>
</div>
<div class="map-dock is-expanded" data-trip-theme="japan" style="position:relative;border-top-left-radius:28px;border-top-right-radius:28px;background:var(--glass-strong);backdrop-filter:blur(24px);border-top:1px solid var(--color-border);padding:0 0 calc(env(safe-area-inset-bottom) + 14px);margin-top:-24px">
  <div style="display:flex;justify-content:center;padding:12px 0 6px"><div style="width:52px;height:5px;border-radius:999px;background:var(--color-border)"></div></div>
  <div style="display:flex;align-items:center;gap:12px;padding:4px 20px 12px">
    <div class="cover" style="width:48px;height:48px;border-radius:14px"></div>
    <div style="flex:1"><div style="font-weight:700">Giappone</div><div style="font-size:12px;color:var(--color-text-secondary)">Giorno 1 di 10</div></div>
  </div>
  <div style="display:flex;justify-content:center;align-items:center;gap:16px;padding:0 20px 16px">
    <div style="width:46px;height:46px;border-radius:50%;background:var(--color-surface-secondary);display:flex;align-items:center;justify-content:center">«</div>
    <div style="width:60px;height:60px;border-radius:50%;background:var(--trip-accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px">▶</div>
    <div style="width:46px;height:46px;border-radius:50%;background:var(--color-surface-secondary);display:flex;align-items:center;justify-content:center">»</div>
  </div>
  <div style="padding:0 22px"><div class="bar" data-trip-theme="japan"><i style="width:40%"></i></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-top:6px"><span>Giorno 1</span><span>Giorno 10</span></div></div>
</div>
</div></body></html>
