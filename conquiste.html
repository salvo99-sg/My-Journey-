<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Mappa delle conquiste — prototipo</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a1228; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }

  #mappa { position: absolute; inset: 0; }

  /* Intestazione con titolo e contatori */
  #testa { position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: calc(14px + env(safe-area-inset-top, 0px)) 16px 16px;
    background: linear-gradient(to bottom, rgba(10,18,40,.92) 0%, rgba(10,18,40,.7) 70%, rgba(10,18,40,0) 100%);
    pointer-events: none; }
  #titolo { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: .3px; display: flex; align-items: center; gap: 8px; }
  #sottotitolo { color: #9db2d8; font-size: 13px; margin-top: 3px; }

  /* Pannello contatori in basso */
  #contatori { position: absolute; left: 12px; right: 12px; bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    z-index: 5; background: rgba(16,26,48,.92); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.08); border-radius: 16px; padding: 14px 10px;
    display: flex; justify-content: space-around; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
  .conta { text-align: center; flex: 1; }
  .conta .num { color: #fff; font-size: 24px; font-weight: 800; line-height: 1; }
  .conta .et { color: #8aa0c8; font-size: 11px; margin-top: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .conta + .conta { border-left: 1px solid rgba(255,255,255,.08); }

  /* Barra percentuale dentro il pannello */
  #barraMondo { position: absolute; left: 12px; right: 12px; bottom: calc(108px + env(safe-area-inset-bottom, 0px));
    z-index: 5; }
  #barraSfondo { height: 8px; background: rgba(255,255,255,.1); border-radius: 99px; overflow: hidden; }
  #barraPieno { height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, #E9A03B, #E4572E); transition: width 1.2s cubic-bezier(.2,.8,.2,1); }
  #barraTesto { color: #9db2d8; font-size: 11px; margin-top: 6px; text-align: center; }

  /* Legenda degli stati (in alto a destra) */
  #legenda { position: absolute; top: calc(74px + env(safe-area-inset-top, 0px)); right: 12px; z-index: 5;
    background: rgba(16,26,48,.85); border-radius: 12px; padding: 9px 11px; font-size: 11px; color: #c9d6ef; }
  .voce-leg { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
  .pallino { width: 12px; height: 12px; border-radius: 3px; }

  /* Pannello "tocca un paese" che appare in basso quando selezioni */
  #info { position: absolute; left: 12px; right: 12px; bottom: calc(16px + env(safe-area-inset-bottom, 0px));
    z-index: 6; background: rgba(16,26,48,.96); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.1); border-radius: 16px; padding: 16px;
    transform: translateY(150%); transition: transform .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #info.su { transform: translateY(0); }
  #infoNome { color: #fff; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  #infoAzioni { display: flex; gap: 8px; }
  #infoAzioni button { flex: 1; border: none; border-radius: 11px; padding: 12px; font-size: 14px; font-weight: 600; }
  #btnVisitato { background: #E4572E; color: #fff; }
  #btnNonVisitato { background: rgba(255,255,255,.1); color: #fff; }
  #infoChiudi { position: absolute; top: 12px; right: 14px; background: none; border: none; color: #7e92b8; font-size: 18px; }
</style>
</head>
<body>
<div id="mappa"></div>

<div id="testa">
  <div id="titolo">🌍 Le mie conquiste</div>
  <div id="sottotitolo">Il mondo che hai esplorato</div>
</div>

<div id="legenda">
  <div class="voce-leg"><span class="pallino" style="background:#E4572E"></span> Visitato</div>
  <div class="voce-leg"><span class="pallino" style="background:#E9A03B"></span> In viaggio ora</div>
  <div class="voce-leg"><span class="pallino" style="background:rgba(255,255,255,.15)"></span> Da scoprire</div>
</div>

<div id="barraMondo">
  <div id="barraSfondo"><div id="barraPieno"></div></div>
  <div id="barraTesto"></div>
</div>

<div id="contatori">
  <div class="conta"><div class="num" id="numPaesi">0</div><div class="et">Paesi</div></div>
  <div class="conta"><div class="num" id="numContinenti">0</div><div class="et">Continenti</div></div>
  <div class="conta"><div class="num" id="numPerc">0%</div><div class="et">del mondo</div></div>
</div>

<div id="info">
  <button id="infoChiudi">✕</button>
  <div id="infoNome">—</div>
  <div id="infoAzioni">
    <button id="btnVisitato">✓ Segna come visitato</button>
    <button id="btnNonVisitato">Rimuovi</button>
  </div>
</div>

<script>
const MAPBOX_TOKEN = "pk.eyJ1IjoieGNvc21veCIsImEiOiJjbXFjd2pzZHYwZjB0MnFyOG03cTA4ZXZzIn0.I8FKfkbsa_1A5bZbz4PUEw";

// === DATI DI ESEMPIO (nel prodotto verranno dai viaggi) ===
// codici ISO 3166-1 alpha-2 dei paesi. Stato: "visitato" o "incorso".
const paesiVisitati = {
  "IT": "visitato",  // Italia
  "FR": "visitato",  // Francia
  "ES": "visitato",  // Spagna
  "GR": "visitato",  // Grecia
  "PT": "visitato",  // Portogallo
  "US": "visitato",  // Stati Uniti
  "JP": "visitato",  // Giappone
  "TH": "visitato",  // Thailandia
  "MA": "visitato",  // Marocco
  "GB": "visitato",  // Regno Unito
  "DE": "visitato",  // Germania
  "HR": "incorso",   // Croazia — viaggio in corso ORA (pulsa)
};

// continenti per ogni paese (per il contatore) — sottoinsieme di esempio
const continenteDi = {
  IT:"EU", FR:"EU", ES:"EU", GR:"EU", PT:"EU", GB:"EU", DE:"EU", HR:"EU",
  US:"NA", JP:"AS", TH:"AS", MA:"AF",
};
const TOTALE_PAESI_MONDO = 195;

mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({
  container: "mappa",
  style: "mapbox://styles/mapbox/standard",
  projection: "mercator",     // planisfero disteso
  center: [10, 30], zoom: 1.4,
  config: { basemap: { lightPreset: "night", showPlaceLabels: false, showRoadLabels: false, showPointOfInterestLabels: false, showTransitLabels: false } },
});

map.on("style.load", () => {
  // sorgente ufficiale Mapbox coi confini di tutti i paesi
  map.addSource("paesi", {
    type: "vector",
    url: "mapbox://mapbox.country-boundaries-v1",
  });

  // costruisco le espressioni per colorare in base allo stato del paese
  const elencoVisitati = Object.keys(paesiVisitati).filter(k => paesiVisitati[k] === "visitato");
  const elencoIncorso  = Object.keys(paesiVisitati).filter(k => paesiVisitati[k] === "incorso");

  // colore: arancio acceso se visitato, oro se in corso, quasi trasparente se mai visitato
  const coloreFill = [
    "case",
    ["in", ["get", "iso_3166_1"], ["literal", elencoIncorso]], "#E9A03B",
    ["in", ["get", "iso_3166_1"], ["literal", elencoVisitati]], "#E4572E",
    "rgba(255,255,255,0.04)"
  ];
  const opacitaFill = [
    "case",
    ["in", ["get", "iso_3166_1"], ["literal", elencoIncorso]], 0.75,
    ["in", ["get", "iso_3166_1"], ["literal", elencoVisitati]], 0.6,
    0.04
  ];

  // strato di riempimento dei paesi
  map.addLayer({
    id: "paesi-fill",
    type: "fill",
    source: "paesi",
    "source-layer": "country_boundaries",
    paint: {
      "fill-color": coloreFill,
      "fill-opacity": opacitaFill,
      "fill-emissive-strength": 1,   // li fa "brillare" nel preset notte
    },
  });

  // contorno sottile per i paesi visitati (rende il "tassello" più definito)
  map.addLayer({
    id: "paesi-bordo",
    type: "line",
    source: "paesi",
    "source-layer": "country_boundaries",
    paint: {
      "line-color": [
        "case",
        ["in", ["get", "iso_3166_1"], ["literal", elencoIncorso]], "#ffd27a",
        ["in", ["get", "iso_3166_1"], ["literal", elencoVisitati]], "#ff8a5c",
        "rgba(0,0,0,0)"
      ],
      "line-width": 1.2,
    },
  });

  avviaPulsazione(elencoIncorso);
  aggiornaContatori();
});

// === PULSAZIONE dei paesi "in corso" ===
// faccio oscillare l'opacità del fill dei paesi in corso per dare l'effetto "respiro"
function avviaPulsazione(elencoIncorso) {
  if (!elencoIncorso.length) return;
  let t = 0;
  setInterval(() => {
    t += 0.08;
    const o = 0.55 + Math.sin(t) * 0.22; // oscilla tra ~0.33 e ~0.77
    if (!map.getLayer("paesi-fill")) return;
    map.setPaintProperty("paesi-fill", "fill-opacity", [
      "case",
      ["in", ["get", "iso_3166_1"], ["literal", elencoIncorso]], o,
      ["in", ["get", "iso_3166_1"], ["literal", Object.keys(paesiVisitati).filter(k=>paesiVisitati[k]==="visitato")]], 0.6,
      0.04
    ]);
  }, 60);
}

// === CONTATORI ===
function aggiornaContatori() {
  const tot = Object.keys(paesiVisitati).length;
  const continenti = new Set(Object.keys(paesiVisitati).map(k => continenteDi[k]).filter(Boolean));
  const perc = Math.round((tot / TOTALE_PAESI_MONDO) * 100);
  document.getElementById("numPaesi").textContent = tot;
  document.getElementById("numContinenti").textContent = continenti.size;
  document.getElementById("numPerc").textContent = perc + "%";
  document.getElementById("barraTesto").textContent = `${tot} paesi su ${TOTALE_PAESI_MONDO} nel mondo`;
  setTimeout(() => { document.getElementById("barraPieno").style.width = Math.max(2, perc) + "%"; }, 300);
}

// === TOCCO SU UN PAESE (per segnarlo a mano) ===
let paeseSelez = null;
map.on("click", "paesi-fill", (e) => {
  const f = e.features[0];
  const nome = f.properties.name_it || f.properties.name_en || f.properties.name || "Paese";
  const iso = f.properties.iso_3166_1;
  paeseSelez = iso;
  document.getElementById("infoNome").textContent = nome;
  document.getElementById("info").classList.add("su");
});
document.getElementById("infoChiudi").addEventListener("click", () => {
  document.getElementById("info").classList.remove("su");
});
// (nel prototipo i bottoni mostrano solo come sarebbe: la logica vera la mettiamo nell'app)
document.getElementById("btnVisitato").addEventListener("click", () => {
  document.getElementById("info").classList.remove("su");
});
document.getElementById("btnNonVisitato").addEventListener("click", () => {
  document.getElementById("info").classList.remove("su");
});
</script>
</body>
</html>
