<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>I miei passi nel mondo</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0f1b2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #mappa { position: absolute; inset: 0; background: #0f1b2e; }
  .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { opacity: 0.2; }

  /* etichette continenti (solo decorative, da lontano) */
  .cont-label { position: absolute; transform: translate(-50%,-50%); z-index: 4; pointer-events: none;
    color: rgba(232,184,75,.45); font-weight: 800; letter-spacing: 3px; font-size: 14px;
    text-transform: uppercase; white-space: nowrap; transition: opacity .4s; text-shadow: 0 2px 8px rgba(0,0,0,.5); }

  #testa { position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: calc(16px + env(safe-area-inset-top, 0px)) 18px 22px;
    background: linear-gradient(to bottom, rgba(15,27,46,.95), rgba(15,27,46,0)); pointer-events: none; }
  #titolo { color: #fff; font-size: 21px; font-weight: 800; }
  #sottotitolo { color: #7e8ba5; font-size: 13px; margin-top: 2px; }

  /* striscia contatori minimal sotto il titolo */
  #pannello { position: absolute; left: 18px; right: 18px; top: calc(70px + env(safe-area-inset-top, 0px));
    z-index: 5; pointer-events: none; }
  #contatori { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .conta { display: flex; align-items: baseline; gap: 5px; }
  .conta .num { color: #fff; font-size: 18px; font-weight: 800; line-height: 1; text-shadow: 0 1px 6px rgba(0,0,0,.6); }
  .conta .et { color: #aeb9cf; font-size: 11px; font-weight: 500; text-shadow: 0 1px 4px rgba(0,0,0,.6); }
  .conta .et::before { content: "·"; margin-right: 6px; color: rgba(255,255,255,.3); }
  .conta:first-child .et::before { content: ""; margin: 0; }
  #barraSfondo { height: 4px; background: rgba(255,255,255,.12); border-radius: 99px; overflow: hidden; max-width: 220px; }
  #barraPieno { height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, #E8B84B, #f0c869); transition: width 1.1s cubic-bezier(.2,.8,.2,1); }

  #info { position: absolute; left: 12px; right: 12px; bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 6; background: #14233a; border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 18px 16px;
    transform: translateY(170%); transition: transform .35s cubic-bezier(.2,.8,.2,1); box-shadow: 0 8px 30px rgba(0,0,0,.5); }
  #info.su { transform: translateY(0); }
  #infoNome { color: #fff; font-size: 19px; font-weight: 800; margin-bottom: 3px; }
  #infoStato { color: #7e8ba5; font-size: 13px; margin-bottom: 14px; }
  #infoAzioni { display: flex; gap: 8px; }
  #infoAzioni button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; }
  #btnVisitato { background: #E8B84B; color: #3a2c00; }
  #btnRimuovi { background: rgba(255,255,255,.08); color: #c8d2e6; }
  #infoChiudi { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #5a6a86; font-size: 18px; }

  #btnTest, #btnTestOff { position: absolute; z-index: 7; bottom: calc(20px + env(safe-area-inset-bottom,0px));
    border: none; border-radius: 11px; padding: 11px 14px; font-size: 13px; font-weight: 700; box-shadow: 0 4px 14px rgba(0,0,0,.4); }
  #btnTest { left: 14px; background: #e63946; color: #fff; }
  #btnTestOff { left: 190px; background: rgba(255,255,255,.14); color: #c8d2e6; }
</style>
</head>
<body>
<div id="mappa"></div>
<div id="continenti-labels"></div>

<div id="testa">
  <div id="titolo">I miei passi nel mondo</div>
  <div id="sottotitolo">Ogni passo, una storia</div>
</div>

<div id="pannello">
  <div id="contatori">
    <div class="conta"><span class="num" id="numPaesi">0</span><span class="et">paesi</span></div>
    <div class="conta"><span class="num" id="numPerc">0%</span><span class="et">del mondo</span></div>
  </div>
  <div id="barraSfondo"><div id="barraPieno"></div></div>
</div>

<!-- PULSANTI DI TEST: solo nel prototipo -->
<button id="btnTest">🧪 Accendi tutto (test)</button>
<button id="btnTestOff">Spegni tutto</button>

<div id="info">
  <button id="infoChiudi">✕</button>
  <div id="infoNome">—</div>
  <div id="infoStato">—</div>
  <div id="infoAzioni">
    <button id="btnVisitato">✓ Segna visitato</button>
    <button id="btnRimuovi">Rimuovi</button>
  </div>
</div>

<script>
const MAPBOX_TOKEN = "pk.eyJ1IjoieGNvc21veCIsImEiOiJjbXFjd2pzZHYwZjB0MnFyOG03cTA4ZXZzIn0.I8FKfkbsa_1A5bZbz4PUEw";

// === UNICO STATO: i paesi visitati ===
let visitati = new Set([
  "IT","FR","ES","GR","PT","DE","GB","NL","BE","CH",
  "AT","IE","DK","SE","NO","FI","PL","CZ","HR",
  "US","JP","TH",
]);

// Elenco dei paesi del mondo, usato SOLO per:
//  - il pulsante di test "Accendi tutto"
//  - il denominatore della percentuale
// (niente più logica di "continente completato": era la fonte dei bug)
const TUTTI_I_PAESI = [
  // Europa
  "AL","AD","AT","BY","BE","BA","BG","HR","CY","CZ","DK","EE","FI","FR","DE","GR","HU","IS","IE","IT","XK","LV","LI","LT","LU","MT","MD","MC","ME","NL","MK","NO","PL","PT","RO","RU","SM","RS","SK","SI","ES","SE","CH","UA","GB","VA",
  // Asia
  "AF","AM","AZ","BH","BD","BT","BN","KH","CN","GE","IN","ID","IR","IQ","IL","JP","JO","KZ","KW","KG","LA","LB","MY","MV","MN","MM","NP","KP","OM","PK","PS","PH","QA","SA","SG","KR","LK","SY","TW","TJ","TH","TL","TR","TM","AE","UZ","VN","YE",
  // Africa
  "DZ","AO","BJ","BW","BF","BI","CV","CM","CF","TD","KM","CG","CD","CI","DJ","EG","GQ","ER","SZ","ET","GA","GM","GH","GN","GW","KE","LS","LR","LY","MG","MW","ML","MR","MU","MA","MZ","NA","NE","NG","RW","ST","SN","SC","SL","SO","ZA","SS","SD","TZ","TG","TN","UG","ZM","ZW",
  // Nord America
  "AG","BS","BB","BZ","CA","CR","CU","DM","DO","SV","GD","GT","HT","HN","JM","MX","NI","PA","KN","LC","VC","TT","US",
  // Sud America
  "AR","BO","BR","CL","CO","EC","GY","PY","PE","SR","UY","VE",
  // Oceania
  "AU","FJ","KI","MH","FM","NR","NZ","PW","PG","WS","SB","TO","TV","VU",
  // Grandi territori senza stato sovrano (per coprire tutta la terra sulla mappa)
  "GL","AQ",
];
const TOTALE_PAESI_MONDO = TUTTI_I_PAESI.length; // = 199 (197 paesi + Groenlandia e Antartide)

// posizioni delle etichette dei continenti [lng, lat, nome] — solo decorative
const ETICHETTE_CONTINENTI = [
  [-100, 45, "Nord America"],
  [-60, -15, "Sud America"],
  [16, 50, "Europa"],
  [20, 5, "Africa"],
  [90, 45, "Asia"],
  [134, -25, "Oceania"],
];

const COL_VISITATO = "#E8B84B", COL_SPENTO = "#2a3a52", COL_MARE = "#0f1b2e";

mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({
  container: "mappa",
  style: "mapbox://styles/mapbox/dark-v11",
  projection: "mercator",
  center: [12, 30], zoom: 1.4,
  minZoom: 1, maxZoom: 6,
  renderWorldCopies: true,
  pitchWithRotate: false, dragRotate: false,
  bearing: 0, pitch: 0, maxPitch: 0, minPitch: 0,
});
map.dragRotate.disable();
map.touchZoomRotate.disableRotation();
map.touchPitch.disable();
if (map.keyboard && map.keyboard.disableRotation) map.keyboard.disableRotation();
map.on("rotate", () => { if (map.getBearing() !== 0) map.setBearing(0); });
map.on("pitch", () => { if (map.getPitch() !== 0) map.setPitch(0); });

map.on("style.load", () => {
  if (map.getLayer("background")) map.setPaintProperty("background", "background-color", COL_MARE);
  if (map.getLayer("water")) map.setPaintProperty("water", "fill-color", COL_MARE);

  map.addSource("paesi", { type: "vector", url: "mapbox://mapbox.country-boundaries-v1" });

  let primaLabel;
  for (const l of map.getStyle().layers) {
    if (l.type === "symbol") { primaLabel = l.id; break; }
  }
  map.addLayer({
    id: "paesi-fill", type: "fill", source: "paesi", "source-layer": "country_boundaries",
    paint: { "fill-color": espressioneColore(), "fill-opacity": 0.92 },
  }, primaLabel);
  map.addLayer({
    id: "paesi-bordo", type: "line", source: "paesi", "source-layer": "country_boundaries",
    paint: { "line-color": "rgba(15,27,46,.8)", "line-width": 0.7 },
  }, primaLabel);

  // pulizia etichette: tengo solo nazioni / capitali / regioni
  for (const l of map.getStyle().layers) {
    if (l.type !== "symbol") continue;
    const id = l.id.toLowerCase();
    try {
      if (id.includes("country") && id.includes("label")) {
        map.setLayerZoomRange(l.id, 2.2, 4.4);
        map.setLayoutProperty(l.id, "visibility", "visible");
      } else if (id.includes("state") && id.includes("label")) {
        map.setLayerZoomRange(l.id, 5, 22);
        map.setLayoutProperty(l.id, "visibility", "visible");
      } else if ((id.includes("settlement-major") || id.includes("capital")) && id.includes("label")) {
        map.setLayerZoomRange(l.id, 4, 6.5);
        map.setLayoutProperty(l.id, "visibility", "visible");
      } else {
        map.setLayoutProperty(l.id, "visibility", "none");
      }
    } catch (e) {}
  }

  costruisciEtichetteContinenti();
  applicaStile();
  aggiornaContatori();
  aggiornaEtichetteContinenti();
});

// === colore del layer: visitato = oro, resto = spento ===
// Quando accendiTutto e attivo (pulsante test), OGNI poligono diventa oro,
// senza guardare il codice: cosi non puo restare nessuna sbavatura.
let accendiTutto = false;
function espressioneColore() {
  if (accendiTutto) return COL_VISITATO;   // tutto oro, zero eccezioni
  return [
    "case",
    ["in", ["get", "iso_3166_1"], ["literal", Array.from(visitati)]], COL_VISITATO,
    COL_SPENTO
  ];
}
function applicaStile() {
  if (!map.getLayer("paesi-fill")) return;
  map.setPaintProperty("paesi-fill", "fill-color", espressioneColore());
}

// === etichette continenti decorative ===
const labelEls = [];
function costruisciEtichetteContinenti() {
  const cont = document.getElementById("continenti-labels");
  ETICHETTE_CONTINENTI.forEach(([lng, lat, nome]) => {
    const el = document.createElement("div");
    el.className = "cont-label";
    el.textContent = nome;
    cont.appendChild(el);
    labelEls.push({ el, lng, lat });
  });
}
function aggiornaEtichetteContinenti() {
  const visibili = map.getZoom() < 2.2;
  labelEls.forEach(o => {
    const p = map.project([o.lng, o.lat]);
    o.el.style.left = p.x + "px";
    o.el.style.top = p.y + "px";
    o.el.style.opacity = visibili ? "1" : "0";
  });
}
map.on("move", aggiornaEtichetteContinenti);
map.on("zoom", aggiornaEtichetteContinenti);

// === contatori: paesi + percentuale (mai oltre il 100%) ===
function aggiornaContatori() {
  // in modalita test "tutto acceso" mostriamo il pieno: tutta la terra = 100%
  const tot = accendiTutto ? TOTALE_PAESI_MONDO : visitati.size;
  const perc = Math.min(100, Math.round((tot / TOTALE_PAESI_MONDO) * 100));
  document.getElementById("numPaesi").textContent = tot;
  document.getElementById("numPerc").textContent = perc + "%";
  setTimeout(() => { document.getElementById("barraPieno").style.width = Math.max(2, perc) + "%"; }, 200);
}

function ricolora() {
  applicaStile();
  aggiornaContatori();
}

// === interazione ===
let selez = null;
map.on("click", "paesi-fill", (e) => {
  const f = e.features[0];
  const iso = f.properties.iso_3166_1;
  const nome = f.properties.name_it || f.properties.name_en || f.properties.name || "Paese";
  selez = iso;
  const visitato = visitati.has(iso);
  document.getElementById("infoNome").textContent = (visitato ? "🏆 " : "📍 ") + nome;
  document.getElementById("infoStato").textContent = visitato ? "Visitato" : "Ancora da scoprire";
  document.getElementById("btnVisitato").textContent = visitato ? "✓ Già visitato" : "✓ Segna visitato";
  document.getElementById("info").classList.add("su");
});
document.getElementById("infoChiudi").addEventListener("click", () => document.getElementById("info").classList.remove("su"));
document.getElementById("btnVisitato").addEventListener("click", () => {
  accendiTutto = false;            // si torna allo stato reale
  if (selez) { visitati.add(selez); ricolora(); }
  document.getElementById("info").classList.remove("su");
});
document.getElementById("btnRimuovi").addEventListener("click", () => {
  accendiTutto = false;            // si torna allo stato reale
  if (selez) { visitati.delete(selez); ricolora(); }
  document.getElementById("info").classList.remove("su");
});

// === pulsanti di test ===
document.getElementById("btnTest").addEventListener("click", () => {
  accendiTutto = true;             // colora OGNI terra, nessuna lista, nessuna sbavatura
  ricolora();
});
document.getElementById("btnTestOff").addEventListener("click", () => {
  accendiTutto = false;
  visitati.clear();
  ricolora();
});
</script>
</body>
</html>
