<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Le mie conquiste — prototipo premium</title>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #ececec; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
  #mappa { position: absolute; inset: 0; background: #ececec; }

  /* nasconde il logo/attribuzione per un look più pulito (nel prodotto vero si gestisce diversamente) */
  .mapboxgl-ctrl-logo, .mapboxgl-ctrl-attrib { opacity: 0.25; }

  #testa { position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding: calc(16px + env(safe-area-inset-top, 0px)) 18px 18px;
    background: linear-gradient(to bottom, rgba(236,236,236,.96), rgba(236,236,236,0));
    pointer-events: none; }
  #titolo { color: #2a2a2a; font-size: 21px; font-weight: 800; letter-spacing: .2px; }
  #sottotitolo { color: #8a8a8a; font-size: 13px; margin-top: 2px; }

  #legenda { position: absolute; top: calc(78px + env(safe-area-inset-top, 0px)); right: 14px; z-index: 5;
    background: rgba(255,255,255,.9); border-radius: 12px; padding: 10px 12px; font-size: 11px; color: #555;
    box-shadow: 0 2px 10px rgba(0,0,0,.08); }
  .voce-leg { display: flex; align-items: center; gap: 7px; margin: 4px 0; }
  .pallino { width: 13px; height: 13px; border-radius: 3px; flex: none; }

  #pannello { position: absolute; left: 12px; right: 12px; bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 5; background: rgba(255,255,255,.96); backdrop-filter: blur(8px);
    border-radius: 18px; padding: 16px 12px; box-shadow: 0 6px 26px rgba(0,0,0,.14); }
  #barraSfondo { height: 9px; background: #e0e0e0; border-radius: 99px; overflow: hidden; margin-bottom: 4px; }
  #barraPieno { height: 100%; width: 0%; border-radius: 99px;
    background: linear-gradient(90deg, #E8A33D, #D2691E); transition: width 1.3s cubic-bezier(.2,.8,.2,1); }
  #barraTesto { color: #999; font-size: 11px; text-align: center; margin-bottom: 14px; }
  #contatori { display: flex; justify-content: space-around; }
  .conta { text-align: center; flex: 1; }
  .conta .num { color: #2a2a2a; font-size: 25px; font-weight: 800; line-height: 1; }
  .conta .et { color: #999; font-size: 10.5px; margin-top: 5px; text-transform: uppercase; letter-spacing: .5px; }
  .conta + .conta { border-left: 1px solid #ececec; }

  #info { position: absolute; left: 12px; right: 12px; bottom: calc(14px + env(safe-area-inset-bottom, 0px));
    z-index: 6; background: #fff; border-radius: 18px; padding: 18px 16px;
    transform: translateY(160%); transition: transform .35s cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 8px 30px rgba(0,0,0,.2); }
  #info.su { transform: translateY(0); }
  #infoNome { color: #2a2a2a; font-size: 19px; font-weight: 800; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
  #infoStato { color: #999; font-size: 13px; margin-bottom: 14px; }
  #infoAzioni { display: flex; gap: 8px; }
  #infoAzioni button { flex: 1; border: none; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; }
  #btnVisitato { background: #D2691E; color: #fff; }
  #btnRimuovi { background: #f0f0f0; color: #555; }
  #infoChiudi { position: absolute; top: 14px; right: 16px; background: none; border: none; color: #bbb; font-size: 18px; }
</style>
</head>
<body>
<div id="mappa"></div>

<div id="testa">
  <div id="titolo">Le mie conquiste</div>
  <div id="sottotitolo">Il mondo che hai sbloccato</div>
</div>

<div id="legenda">
  <div class="voce-leg"><span class="pallino" style="background:#D2691E"></span> Visitato</div>
  <div class="voce-leg"><span class="pallino" style="background:#E8A33D"></span> In viaggio ora</div>
  <div class="voce-leg"><span class="pallino" style="background:#b0b0b0"></span> Da scoprire</div>
  <div class="voce-leg"><span class="pallino" style="background:#3a6ea5"></span> Continente completo</div>
</div>

<div id="pannello">
  <div id="barraSfondo"><div id="barraPieno"></div></div>
  <div id="barraTesto"></div>
  <div id="contatori">
    <div class="conta"><div class="num" id="numPaesi">0</div><div class="et">Paesi</div></div>
    <div class="conta"><div class="num" id="numContinenti">0</div><div class="et">Continenti</div></div>
    <div class="conta"><div class="num" id="numPerc">0%</div><div class="et">del mondo</div></div>
  </div>
</div>

<div id="info">
  <button id="infoChiudi">✕</button>
  <div id="infoNome">—</div>
  <div id="infoStato">—</div>
  <div id="infoAzioni">
    <button id="btnVisitato">✓ Segna visitato</button>
    <button id="btnRimuovi">Rimuovi</button>
  </div>
</div>

<script>
const MAPBOX_TOKEN = "pk.eyJ1IjoieGNvc21veCIsImEiOiJjbXFjd2pzZHYwZjB0MnFyOG03cTA4ZXZzIn0.I8FKfkbsa_1A5bZbz4PUEw";

// === STATO (di esempio; nel prodotto verrà dai viaggi) ===
let paesi = {
  IT:"visitato", FR:"visitato", ES:"visitato", GR:"visitato", PT:"visitato",
  DE:"visitato", GB:"visitato", NL:"visitato", BE:"visitato", CH:"visitato",
  US:"visitato", JP:"visitato", TH:"visitato",
  HR:"incorso",
};

// continenti -> per il premio "continente completo" servono le nazioni principali
const NAZIONI_CONTINENTE = {
  EU: ["IT","FR","ES","GR","PT","DE","GB","NL","BE","CH","AT","IE","DK","SE","NO","FI","PL","CZ"],
  AS: ["JP","TH","CN","IN","VN","KR","ID","MY","PH"],
  NA: ["US","CA","MX"],
  SA: ["BR","AR","CL","PE","CO"],
  AF: ["MA","EG","ZA","KE","TN"],
  OC: ["AU","NZ"],
};
const continenteDi = {};
for (const c in NAZIONI_CONTINENTE) for (const n of NAZIONI_CONTINENTE[c]) continenteDi[n] = c;
const TOTALE_PAESI_MONDO = 195;

// colori
const COL_VISITATO = "#D2691E";   // terracotta/ambra - il trofeo
const COL_INCORSO  = "#E8A33D";   // più chiaro/caldo - pulsa
const COL_SPENTO   = "#b0b0b0";   // grigio scuro - mistero
const COL_CONTINENTE = "#3a6ea5"; // blu profondo - premio continente completo
const COL_MARE = "#ececec";

mapboxgl.accessToken = MAPBOX_TOKEN;
const map = new mapboxgl.Map({
  container: "mappa",
  style: "mapbox://styles/mapbox/light-v11",  // stile chiaro e neutro
  projection: "mercator",
  center: [12, 30], zoom: 1.3,
  minZoom: 1, maxZoom: 4,        // niente zoom dentro città: resta a livello mondo/nazioni
  renderWorldCopies: true,
});

// quali continenti sono "completi" (tutte le nazioni principali visitate)
function continentiCompleti() {
  const out = [];
  for (const c in NAZIONI_CONTINENTE) {
    const tutte = NAZIONI_CONTINENTE[c];
    const fatte = tutte.filter(n => paesi[n] === "visitato" || paesi[n] === "incorso");
    if (fatte.length === tutte.length) out.push(c);
  }
  return out;
}

// costruisce l'espressione colore per il fill dei paesi
function espressioneColore(oIncorso) {
  const visitati = Object.keys(paesi).filter(k => paesi[k] === "visitato");
  const incorso  = Object.keys(paesi).filter(k => paesi[k] === "incorso");
  const completi = continentiCompleti();
  // nazioni dei continenti completi -> colore premio
  const nazioniComplete = [];
  for (const c of completi) nazioniComplete.push(...NAZIONI_CONTINENTE[c]);

  return [
    "case",
    // continente completo: il colore premio vince su tutto
    ["in", ["get", "iso_3166_1"], ["literal", nazioniComplete]], COL_CONTINENTE,
    // in corso (con opacità che pulserà a parte)
    ["in", ["get", "iso_3166_1"], ["literal", incorso]], COL_INCORSO,
    // visitato
    ["in", ["get", "iso_3166_1"], ["literal", visitati]], COL_VISITATO,
    // mai visto
    COL_SPENTO
  ];
}

map.on("style.load", () => {
  // sfondo e mare grigi
  if (map.getLayer("background")) map.setPaintProperty("background", "background-color", COL_MARE);
  if (map.getLayer("water")) map.setPaintProperty("water", "fill-color", COL_MARE);
  if (map.getLayer("land")) map.setPaintProperty("land", "background-color", COL_MARE);

  map.addSource("paesi", { type: "vector", url: "mapbox://mapbox.country-boundaries-v1" });

  // riempimento paesi
  map.addLayer({
    id: "paesi-fill", type: "fill", source: "paesi", "source-layer": "country_boundaries",
    paint: { "fill-color": espressioneColore(), "fill-opacity": 1 },
  });
  // bordo nazioni (perimetro pulito)
  map.addLayer({
    id: "paesi-bordo", type: "line", source: "paesi", "source-layer": "country_boundaries",
    paint: { "line-color": "#ffffff", "line-width": 0.6 },
  });

  avviaPulsazione();
  aggiornaContatori();
});

// pulsazione delle nazioni "in corso" (effetto caricamento/sblocco)
function avviaPulsazione() {
  let t = 0;
  setInterval(() => {
    if (!map.getLayer("paesi-fill")) return;
    const incorso = Object.keys(paesi).filter(k => paesi[k] === "incorso");
    if (!incorso.length) return;
    t += 0.09;
    const o = 0.5 + Math.sin(t) * 0.45; // pulsa marcato
    map.setPaintProperty("paesi-fill", "fill-opacity", [
      "case",
      ["in", ["get", "iso_3166_1"], ["literal", incorso]], o,
      1
    ]);
  }, 55);
}

function ricolora() {
  if (map.getLayer("paesi-fill")) map.setPaintProperty("paesi-fill", "fill-color", espressioneColore());
  aggiornaContatori();
}

function aggiornaContatori() {
  const visitatiTot = Object.keys(paesi).filter(k => paesi[k] === "visitato" || paesi[k] === "incorso");
  const tot = visitatiTot.length;
  const continenti = new Set(visitatiTot.map(k => continenteDi[k]).filter(Boolean));
  const perc = Math.round((tot / TOTALE_PAESI_MONDO) * 100);
  document.getElementById("numPaesi").textContent = tot;
  document.getElementById("numContinenti").textContent = continenti.size;
  document.getElementById("numPerc").textContent = perc + "%";
  document.getElementById("barraTesto").textContent = `${tot} paesi su ${TOTALE_PAESI_MONDO} · ${continentiCompleti().length} continenti completati`;
  setTimeout(() => { document.getElementById("barraPieno").style.width = Math.max(2, perc) + "%"; }, 300);
}

// tocco su un paese
let selez = null;
map.on("click", "paesi-fill", (e) => {
  const f = e.features[0];
  const iso = f.properties.iso_3166_1;
  const nome = f.properties.name_it || f.properties.name_en || f.properties.name || "Paese";
  selez = iso;
  const stato = paesi[iso];
  const elNome = document.getElementById("infoNome");
  const elStato = document.getElementById("infoStato");
  if (stato === "visitato") { elNome.textContent = "🏆 " + nome; elStato.textContent = "Conquistato"; }
  else if (stato === "incorso") { elNome.textContent = "⏳ " + nome; elStato.textContent = "Lo stai visitando ora"; }
  else { elNome.textContent = "❓ " + nome; elStato.textContent = "Ancora da scoprire"; }
  document.getElementById("btnVisitato").textContent = stato === "visitato" ? "✓ Già visitato" : "✓ Segna visitato";
  document.getElementById("info").classList.add("su");
});
document.getElementById("infoChiudi").addEventListener("click", () => document.getElementById("info").classList.remove("su"));
document.getElementById("btnVisitato").addEventListener("click", () => {
  if (selez) { paesi[selez] = "visitato"; ricolora(); }
  document.getElementById("info").classList.remove("su");
});
document.getElementById("btnRimuovi").addEventListener("click", () => {
  if (selez) { delete paesi[selez]; ricolora(); }
  document.getElementById("info").classList.remove("su");
});
</script>
</body>
</html>
